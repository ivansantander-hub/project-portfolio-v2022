<!-- ── MOLECULE: SiteHeader ────────────────────────────────────────────────
  Composes: logo atom, ticker-tape atom, theme-switcher atom.
  The ticker animation is pure CSS (animation: slide 10s linear infinite),
  so text is inlined here — no JS required.
──────────────────────────────────────────────────────────────────────────── -->
<header class="pin-1 header" role="banner">

  <!-- ATOM: Logo -->
  <div class="logo" aria-label="Iván Santander">
    <p>IVÁN SANTANDER</p>
  </div>

  <!-- ATOM: Ticker tape (decorative, CSS-only scroll) -->
  <div class="animation-header" aria-hidden="true">
    <div class="content-animation-header">
      <p><span class="slide"> 情報は力です | BOOT SEQUENCE INITIATED | WELCOME PORTAL 2022 | クリエイティブ </span></p>
      <p><span class="slide slide-2"> 情報は力です | BOOT SEQUENCE INITIATED | WELCOME PORTAL 2022 | クリエイティブ </span></p>
    </div>
  </div>

  <!-- ATOM: Theme-switcher swatches -->
  <nav class="menu" aria-label="Color theme">
    <div class="colors" role="group" aria-label="Select color theme">
      <button class="color-1 color swatch" type="button"
        aria-label="Dark theme"
        data-bg="#111111" data-text="#e8e0ea" data-contrast="#e8e0ea"></button>
      <button class="color-2 color swatch" type="button"
        aria-label="Dark Rose theme"
        data-bg="#111111" data-text="#c9a0b8" data-contrast="#c9a0b8"></button>
      <button class="color-3 color swatch" type="button"
        aria-label="Light theme"
        data-bg="#f2eef4" data-text="#1a1a1a" data-contrast="#1a1a1a"></button>
      <button class="color-4 color swatch" type="button"
        aria-label="Light Rose theme"
        data-bg="#f0eaed" data-text="#5a3a4a" data-contrast="#5a3a4a"></button>
    </div>
  </nav>

</header>
