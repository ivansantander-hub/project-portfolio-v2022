<!-- ── ATOM: Preloader ─────────────────────────────────────────────────────
  Cinematic loading screen:
  - Giant VT323 counter 000 → 100 fills the viewport
  - Name + tagline below in small caps
  - Thin progress line at the bottom
  - Exit: full panel slides UP (translateY -100vh) revealing the site
  Controlled by colors.js (progress + hide). GSAP drives the exit slide.
──────────────────────────────────────────────────────────────────────────── -->
<div class="preload" id="preload" aria-hidden="true" role="status" aria-live="polite">

  <!-- Giant progress counter -->
  <span class="preload-counter" id="preload-counter">000</span>

  <!-- Identity line -->
  <div class="preload-identity">
    <span class="preload-name">Iván Santander</span>
    <span class="preload-sep" aria-hidden="true">—</span>
    <span class="preload-role">Design &amp; Code</span>
  </div>

  <!-- Progress line (bottom) -->
  <div class="preload-line" aria-hidden="true">
    <div class="preload-line-fill" id="preload-line-fill"></div>
  </div>

</div>
