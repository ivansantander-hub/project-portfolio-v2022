<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iván Santander. Portfolio — LearUp, BE4CARE, BE4TECH, IROCKET, NEWO.">
  <link rel="canonical" href="https://ivansantander.com/">
  <title>{{ title }}</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23111'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='52' fill='%23F1F4FF'%3EIS%3C/text%3E%3C/svg%3E">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://ivansantander.com/">
  <meta property="og:title"       content="Iván Santander — Portfolio">
  <meta property="og:description" content="Portfolio — LearUp, BE4CARE, BE4TECH, IROCKET, NEWO.">
  <meta property="og:image"       content="https://ivansantander.com/img/og.jpg">
  <meta property="og:site_name"   content="Iván Santander">
  <meta property="og:locale"      content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Iván Santander — Portfolio">
  <meta name="twitter:description" content="Portfolio — LearUp, BE4CARE, BE4TECH, IROCKET, NEWO.">
  <meta name="twitter:image"       content="https://ivansantander.com/img/og.jpg">

  <!-- Styles (local, no CDN) -->
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/lite-projects.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Scroll progress bar -->
<div id="scroll-progress" aria-hidden="true"></div>

<!-- Theme transition overlay (flash on color switch) -->
<div id="theme-overlay" aria-hidden="true"></div>

<!-- Film grain overlay — fixed, pointer-events none, pure CSS noise texture -->
<div class="grain" aria-hidden="true"></div>

<!-- Custom cursor elements (pointer devices only) -->
<div class="cursor-dot"  aria-hidden="true"></div>
<div class="cursor-ring" aria-hidden="true"></div>

<!-- Section indicator (right margin, desktop) -->
<aside class="section-indicator" aria-hidden="true">
  <span class="section-indicator-text" id="section-indicator-text">HOME</span>
</aside>

<!-- Audio indicator (left margin) — hidden until easter egg unlocked -->
<button class="audio-indicator" id="mute-toggle" type="button"
  aria-label="Mute music" aria-pressed="false">
  <span class="audio-eq">
    <span class="audio-eq-bar"></span>
    <span class="audio-eq-bar"></span>
    <span class="audio-eq-bar"></span>
    <span class="audio-eq-bar"></span>
  </span>
  <span class="audio-label">SOUND</span>
</button>

<!-- Easter egg modal — FLACKO glitch reveal -->
<div class="ee-modal" id="ee-modal" aria-hidden="true">
  <div class="ee-cover"></div>
  <!-- Flash images: random ASAP photos that flash during entrance -->
  <div class="ee-img-flash ee-img-f1"></div>
  <div class="ee-img-flash ee-img-f2"></div>
  <div class="ee-img-flash ee-img-f3"></div>
  <div class="ee-img-flash ee-img-f4"></div>
  <div class="ee-img-flash ee-img-f5"></div>
  <div class="ee-text">FLACKO</div>
  <div class="ee-hint">CLICK ANYWHERE</div>
  <div class="ee-scanlines"></div>
  <div class="ee-noise"></div>
</div>

<slot />


<!-- model-viewer custom element (local vendor, no CDN) -->
<script src="vendor/model-viewer.min.js" type="module"></script>

<!-- Lenis smooth scroll (local vendor, no CDN) -->
<script src="vendor/lenis.min.js"></script>

<!-- GSAP + ScrollTrigger (local vendor, no CDN) -->
<script src="vendor/gsap.min.js"></script>
<script src="vendor/ScrollTrigger.min.js"></script>

<!-- App scripts -->
<script src="js/app.js"></script>
<script src="js/colors.js"></script>
<script src="js/cursor.js"></script>
<script src="js/scramble.js"></script>
<script src="js/animations.js"></script>

</body>
</html>
